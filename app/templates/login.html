<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABUAB - System Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #090e17; 
            --cobalt: #2563eb; 
            --cobalt-glow: rgba(37, 99, 235, 0.4);
            --gold: #d4af37; 
            --gold-glow: rgba(212, 175, 55, 0.4);
            --danger: #ef4444; 
            --danger-glow: rgba(239, 68, 68, 0.4);
            --success: #10b981;
            /* Texture Colors */
            --bg-base: #e2e8f0;
            --pattern-color: #cbd5e1;
        }

        /* 🛑 ANIMATED MESH & TEXTURE LAYOUT (Matching index.html) */
        @keyframes mesh { 0% { background-position: 0% 0%, 0% 0%, 0% 0%; } 100% { background-position: 0% 0%, 50px 50px, 100% 100%; } }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #1e293b;
            overflow-x: hidden;
            overflow-y: auto;
            padding: 16px;
            box-sizing: border-box;

            /* Matches the main app background perfectly */
            background-color: var(--bg-base);
            background-image:
                radial-gradient(var(--pattern-color) 1px, transparent 1px),
                linear-gradient(var(--pattern-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--pattern-color) 1px, transparent 1px),
                linear-gradient(120deg, #f8fafc, #cbd5e1, #94a3b8);
            background-size: 25px 25px, 100px 100px, 100px 100px, 400% 400%;
            animation: mesh 30s linear infinite alternate;
        }

        /* 🛑 PREMIUM FROSTED GLASS LOGIN CARD */
        .login-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            padding: 50px 40px;
            border-radius: 30px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.15), inset 0 0 0 1px rgba(255,255,255,1);
            width: 100%;
            max-width: 400px;
            text-align: center;
            position: relative;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            overflow-wrap: anywhere;
        }
        
        @keyframes slideUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }

        /* Top Gold Trim */
        .login-card::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 6px;
            background: linear-gradient(90deg, var(--gold) 0%, transparent 100%);
            border-radius: 30px 30px 0 0;
            opacity: 0.8;
        }

        /* 🛑 YOUR EXACT LOGO FRAME CSS 🛑 */
        @keyframes breathe { 0% { box-shadow: 0 0 20px var(--gold-glow); } 50% { box-shadow: 0 0 40px var(--gold-glow), 0 0 10px rgba(212, 175, 55, 0.2); } 100% { box-shadow: 0 0 20px var(--gold-glow); } }
        
        .logo-frame { 
            width: 165px; 
            height: 167px;  
            border-radius: 50%; 
            border: 4px solid var(--gold); 
            animation: breathe 4s infinite ease-in-out;
            margin: 0 auto 20px auto; 
            overflow: hidden; 
            background: transparent;
            position: relative;
        }

        /* 🛑 YOUR EXACT LOGO NUDGE CSS 🛑 */
        .logo-img { 
            width: 105%; 
            height: 100%;
            object-fit: cover;
            transform: scale(1.15); 
            position: relative;
            left: -11.5px; 
            top: 0px;  
            transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        .logo-frame:hover .logo-img { transform: scale(1.25); }

        .login-card h2 {
            margin: 10px 0 5px 0;
            font-size: clamp(1.7rem, 4vw, 2.2rem);
            font-weight: 900;
            /* Gradient text matching dashboard */
            background: linear-gradient(90deg, var(--primary) 0%, var(--cobalt) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 1px;
        }

        .login-card p {
            color: #64748b;
            font-weight: 700;
            margin-bottom: 35px;
            font-size: clamp(0.9rem, 2.8vw, 1.1rem);
            text-transform: uppercase;
            letter-spacing: 1.4px;
            overflow-wrap: anywhere;
        }

        .input-group {
            text-align: left;
            margin-bottom: 25px;
        }

        .input-group label {
            display: block;
            font-weight: 900;
            font-size: 0.85rem;
            color: var(--primary);
            margin-bottom: 8px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        /* Matches the terminal-grade inputs in the main app */
        input {
            width: 100%;
            padding: 16px 20px;
            border: 2px solid #cbd5e1;
            border-radius: 12px;
            outline: none;
            box-sizing: border-box;
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--primary);
            background: rgba(255,255,255,0.9);
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.02);
            transition: all 0.3s ease;
        }

        input:focus {
            border-color: var(--cobalt);
            background-color: #ffffff;
            box-shadow: 0 0 0 4px var(--cobalt-glow), inset 0 2px 4px rgba(0,0,0,0.01);
            transform: translateY(-2px);
        }

        /* Matches the Liquid Buttons in the main app */
        .btn-login {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, var(--cobalt) 0%, #1e3a8a 100%);
            color: white;
            font-size: 1.1rem;
            font-weight: 900;
            cursor: pointer;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            margin-top: 10px;
            box-shadow: 0 10px 25px var(--cobalt-glow);
            position: relative;
            overflow: hidden;
        }

        .btn-login::after {
            content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s ease;
        }
        
        .btn-login:hover::after { left: 100%; }

        .btn-login:hover {
            transform: translateY(-4px);
            box-shadow: 0 15px 35px var(--cobalt-glow);
        }

        #error-msg {
            color: white;
            font-weight: 800;
            margin-top: 20px;
            display: none;
            background: var(--danger);
            padding: 12px;
            border-radius: 10px;
            box-shadow: 0 5px 15px var(--danger-glow);
            animation: shake 0.4s;
            overflow-wrap: anywhere;
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 32px 20px;
                border-radius: 20px;
            }

            .logo-frame {
                width: 130px;
                height: 130px;
            }

            .btn-login {
                letter-spacing: 1px;
                font-size: 1rem;
            }
        }
        
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo-frame">
            <img src="/static/logo.png" alt="ABUAB Logo" class="logo-img" onerror="this.src='https://via.placeholder.com/170'">
        </div>
        
        <h2>ABUAB</h2>
        <p><i class="fa-solid fa-lock" style="color:var(--gold); margin-right:5px;"></i> SECURE ACCESS</p>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="input-group">
                <label>OPERATOR ID</label>
                <input type="text" id="username" placeholder="Enter ID" required autocomplete="off">
            </div>
            
            <div class="input-group">
                <label>PASSKEY</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-login" id="loginBtn">AUTHORIZE</button>
            <div id="error-msg"><i class="fa-solid fa-triangle-exclamation"></i> ACCESS DENIED</div>
        </form>
    </div>

    <script>
        // Redirect if already logged in
        if (localStorage.getItem('token')) {
            window.location.replace('/');
        }

        async function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const err = document.getElementById('error-msg');
            
            btn.innerText = "AUTHENTICATING...";
            btn.style.opacity = "0.8";
            err.style.display = "none";

            const formData = new FormData();
            formData.append("username", document.getElementById('username').value);
            formData.append("password", document.getElementById('password').value);

            try {
                const response = await fetch('/token', {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    const data = await response.json();
                    localStorage.setItem('token', data.access_token);
                    
                    // Success State
                    btn.innerHTML = "<i class='fa-solid fa-check'></i> GRANTED";
                    btn.style.background = "var(--success)";
                    btn.style.boxShadow = "0 10px 25px rgba(16, 185, 129, 0.4)";
                    
                    setTimeout(() => window.location.replace('/'), 600);
                } else {
                    throw new Error("Invalid");
                }
            } catch (error) {
                err.style.display = "block";
                btn.innerText = "AUTHORIZE";
                btn.style.opacity = "1";
            }
        }
    </script>
</body>
</html>
